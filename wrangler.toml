name = "love-live-diary"
main = "src/worker.ts"
compatibility_date = "2025-05-01"

# R2 binding
[[r2_buckets]]
binding = "DIARY_BUCKET"
bucket_name = "diary-data"

# 非敏感展示配置。敏感项用 secret：
#   npx wrangler secret put DIARY_PIN
#   npx wrangler secret put SESSION_SECRET
#   npx wrangler secret put ADMIN_PASSWORD
[vars]
PAGE_TITLE = "我们的小本本"
PERSON_A = "小A"
PERSON_B = "小B"

# 本地开发默认值见 .dev.vars.example（复制为 .dev.vars）
# 生产环境 DIARY_PIN / SESSION_SECRET / ADMIN_PASSWORD 通过 wrangler secret 注入

[observability]
enabled = true
